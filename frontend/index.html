<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Excalidraw Canvas - MCP</title>
    <style>
        :root {
            --bg-panel: #1e1e1e;
            --col-inactive: #555;
            --col-active: #4ade80;      /* Server Connected (Green) */
            --col-mcp-active: #3b82f6;  /* MCP Active (Blue) */
            --col-pin-active: #fbbf24;  /* Pinned (Gold) */
            --panel-border: rgba(255,255,255,0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            overflow: hidden;
        }

        .app {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Canvas fills entire viewport */
        .canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* MCP Status Bar - Integrated in Excalidraw top-right UI */
        .mcp-status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        /* Status Item */
        .mcp-status-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            color: var(--col-inactive);
            transition: color 0.2s ease;
        }

        .mcp-status-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .mcp-status-item:hover {
            color: #666;
        }

        /* States */
        .mcp-status-item.active-server {
            color: var(--col-active);
        }
        .mcp-status-item.active-server svg {
            filter: drop-shadow(0 0 3px rgba(74, 222, 128, 0.4));
        }

        .mcp-status-item.active-mcp {
            color: var(--col-mcp-active);
        }
        .mcp-status-item.active-mcp svg {
            filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.5));
        }

        .mcp-status-item.active-pin {
            color: var(--col-pin-active);
        }
        .mcp-status-item.active-pin svg {
            filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0.5));
        }

        /* Clear Button */
        .mcp-clear-btn {
            background: transparent;
            color: #666;
            border: 1px solid #ddd;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 4px;
        }

        .mcp-clear-btn:hover {
            background: #f5f5f5;
            color: #333;
            border-color: #ccc;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
</body>
</html>
