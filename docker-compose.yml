# Docker Compose for mcp-excalidraw-live
#
# Usage: docker compose up
# Custom port: HOST_PORT=3334 docker compose up

services:
  excalidraw:
    build: .
    image: mcp-excalidraw-live:latest
    container_name: mcp-excalidraw-live
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - ${HOME}:/host_home
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - HOST_HOME_MOUNT=/host_home
      - HOST_HOME_PATH=${HOME}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3000/health'); process.exit(r.ok ? 0 : 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
